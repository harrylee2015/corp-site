{{define "project-create-content"}}
<div class="bg-white rounded-xl border border-gray-200 p-5 sm:p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-4">添加项目</h1>
    {{if .error}}<div class="bg-red-50 text-red-700 px-4 py-2 rounded-lg mb-4 text-sm">{{.error}}</div>{{end}}
    <form method="POST" action="/api/my/projects" class="space-y-5">
        <input type="hidden" name="_csrf" value="{{.csrf_token}}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">项目名称 <span class="text-red-500">*</span></label>
            <input type="text" name="name" required maxlength="200" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">项目分类 <span class="text-red-500">*</span></label>
            <select name="category_id" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <option value="">请选择</option>
                {{range $g := .navCategories}}{{if $g.Children}}{{range $g.Children}}<option value="{{.ID}}">{{$g.Name}} · {{.Name}}</option>{{end}}{{else}}<option value="{{$g.ID}}">{{$g.Name}}</option>{{end}}{{end}}
            </select>
        </div>
        {{if .isFunder}}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">服务区域（多选省份）<span class="text-red-500">*</span></label>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 max-h-40 overflow-y-auto border border-gray-200 rounded-lg p-3">
                {{range .provinces}}
                <label class="flex items-center gap-1.5 text-xs text-gray-600 cursor-pointer">
                    <input type="checkbox" name="regions" value="{{.}}" class="rounded text-blue-600">{{.}}
                </label>
                {{end}}
            </div>
        </div>
        {{else}}
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">项目所在省 <span class="text-red-500">*</span></label>
                <select name="province" id="regionProvince" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">请选择省份</option>
                    {{range .provinces}}<option value="{{.}}" {{if eq $.selectedProvince .}}selected{{end}}>{{.}}</option>{{end}}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">项目所在市 <span class="text-red-500">*</span></label>
                <select name="city" id="regionCity" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="">请选择城市</option>
                </select>
            </div>
        </div>
        {{end}}
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            {{if not .isFunder}}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">项目预算额度（万元）</label>
                <input type="number" name="budget_amount_wan" min="0.01" step="0.01" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="表名该项目规模多大">
            </div>
            {{end}}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">联系人 <span class="text-red-500">*</span></label>
                <input type="text" name="contact_person" required maxlength="50" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">联系电话 <span class="text-red-500">*</span></label>
                <input type="tel" name="contact_phone" required maxlength="11" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">项目图片</label>
            <input type="file" id="projectImg" accept="image/*" class="text-sm">
            <input type="hidden" name="image_path" id="imagePath">
            <img id="imgPreview" class="mt-2 h-24 hidden rounded-lg object-cover border">
        </div>
        {{if .isFunder}}
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 border border-blue-100 rounded-xl p-4 bg-blue-50/30">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">额度（万元）<span class="text-red-500">*</span></label>
                <input type="number" name="amount_wan" min="0.01" step="0.01" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">利率 <span class="text-red-500">*</span></label>
                <div class="flex gap-2">
                    <select name="rate_type" class="border border-gray-300 rounded-lg px-2 py-2 text-sm bg-white">
                        <option value="yearly">年利率</option>
                        <option value="daily">日利率</option>
                    </select>
                    <input type="number" name="rate_percent" min="0.001" step="0.001" placeholder="%" class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">还款期数 <span class="text-red-500">*</span></label>
                <input type="number" name="period_count" min="1" max="360" value="12" class="w-24 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <span class="text-xs text-gray-500 ml-2">期（按月）</span>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">还款方式 <span class="text-red-500">*</span></label>
                <select name="repay_method" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="equal_installment">等额本息</option>
                    <option value="equal_principal">等额本金</option>
                </select>
            </div>
        </div>
        {{end}}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">项目介绍</label>
            <textarea name="intro" rows="5" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="请描述项目情况、需求或产品特点"></textarea>
        </div>
        <button type="submit" class="w-full sm:w-auto px-8 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">提交审核</button>
    </form>
</div>
<script>
var citiesData={{.citiesJSON | safeJS}};
var initCity='{{.selectedCity}}';
function fillCities(prov){var el=document.getElementById('regionCity');if(!el)return;el.innerHTML='<option value="">请选择城市</option>';(citiesData[prov]||[]).forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;if(c===initCity)o.selected=true;el.appendChild(o);});}
var provEl=document.getElementById('regionProvince');
if(provEl){fillCities(provEl.value);provEl.addEventListener('change',function(){initCity='';fillCities(this.value);});}
document.getElementById('projectImg').addEventListener('change',function(){
  if(!this.files[0])return;
  var f=new FormData();f.append('file',this.files[0]);f.append('_csrf','{{.csrf_token}}');
  fetch('/api/upload',{method:'POST',body:f}).then(r=>r.json()).then(d=>{
    if(d.url){var p=d.url.replace('/uploads/','');document.getElementById('imagePath').value=p;
      var img=document.getElementById('imgPreview');img.src=d.url;img.classList.remove('hidden');
    }else alert(d.error||'上传失败');
  });
});
</script>
{{end}}
