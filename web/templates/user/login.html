{{define "login-content"}}
<div class="max-w-md mx-auto px-4 py-8 sm:py-16">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-6 sm:p-8 relative overflow-hidden">
        <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
        <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-1">用户登录</h2>
        <p class="text-center text-sm text-gray-400 mb-6">欢迎回到金筹网</p>
        {{if .error}}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-4 text-sm">{{.error}}</div>
        {{end}}
        <form method="POST" action="/api/auth/login">
            <input type="hidden" name="_csrf" value="{{.csrf_token}}">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-600 mb-1.5">手机号</label>
                <input type="tel" name="phone" required maxlength="11" placeholder="请输入手机号"
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-1.5">密码</label>
                <input type="password" name="password" required placeholder="请输入密码"
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-2.5 rounded-xl text-sm font-bold hover:shadow-lg hover:shadow-blue-500/25 hover:scale-[1.02] transition-all">登 录</button>
        </form>
        <div class="text-center mt-5 text-sm text-gray-500">
            还没有账号？<a href="/register" class="font-medium text-blue-600 hover:text-blue-800">立即注册</a>
        </div>
    </div>
</div>
{{end}}
