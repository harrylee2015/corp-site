{{define "shop-content"}}
<div class="bg-white rounded-xl border border-gray-200 p-5 sm:p-6">
    <h1 class="text-xl font-bold text-gray-800 mb-4">店铺信息</h1>
    {{if .saved}}<div class="bg-green-50 text-green-700 px-4 py-2 rounded-lg mb-4 text-sm">保存成功</div>{{end}}
    <form method="POST" action="/api/my/shop" class="space-y-5">
        <input type="hidden" name="_csrf" value="{{.csrf_token}}">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">店铺名称</label>
            <input type="text" name="shop_name" value="{{.shop.ShopName}}" maxlength="100" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">可做区域（多选）</label>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 max-h-48 overflow-y-auto border border-gray-200 rounded-lg p-3">
                {{range $province := .provinces}}
                <label class="flex items-center gap-1.5 text-xs text-gray-600 cursor-pointer">
                    <input type="checkbox" name="regions" value="{{$province}}" {{range $.selectedRegions}}{{if eq . $province}}checked{{end}}{{end}} class="rounded text-blue-600">
                    {{$province}}
                </label>
                {{end}}
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">可做的类型（根据身份「{{.identityLabel}}」可选，精确到二级，多选）</label>
            <div class="space-y-3 border border-gray-200 rounded-lg p-3 max-h-56 overflow-y-auto">
                {{range $parent := .navCategories}}
                <div>
                    <div class="text-xs font-semibold text-gray-500 mb-1.5">{{$parent.Name}}</div>
                    {{if $parent.Children}}
                    <div class="flex flex-wrap gap-x-4 gap-y-2 pl-2">
                        {{range $child := $parent.Children}}
                        <label class="flex items-center gap-1.5 text-xs text-gray-600 cursor-pointer">
                            <input type="checkbox" name="category_ids" value="{{$child.ID}}" {{range $.selectedCategoryIDs}}{{if eq . $child.ID}}checked{{end}}{{end}} class="rounded text-blue-600">
                            {{$child.Name}}
                        </label>
                        {{end}}
                    </div>
                    {{else}}
                    <label class="flex items-center gap-1.5 text-xs text-gray-600 cursor-pointer pl-2">
                        <input type="checkbox" name="category_ids" value="{{$parent.ID}}" {{range $.selectedCategoryIDs}}{{if eq . $parent.ID}}checked{{end}}{{end}} class="rounded text-blue-600">
                        {{$parent.Name}}
                    </label>
                    {{end}}
                </div>
                {{end}}
            </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">联系人</label><input type="text" name="contact" value="{{.shop.Contact}}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">手机</label><input type="tel" name="phone" value="{{.shop.Phone}}" maxlength="11" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">电话</label><input type="text" name="tel" value="{{.shop.Tel}}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">公司地址</label><input type="text" name="address" value="{{.shop.Address}}" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"></div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">公司介绍</label>
            <textarea name="intro" rows="4" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">{{.shop.Intro}}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Banner 图</label>
            <input type="file" id="bannerFile" accept="image/*" class="text-sm">
            <input type="hidden" name="banner_path" id="bannerPath" value="{{.shop.BannerPath}}">
            {{if .shop.BannerPath}}<img src="/uploads/{{.shop.BannerPath}}" class="mt-2 h-24 rounded-lg object-cover border">{{end}}
        </div>
        <div class="flex gap-3 pt-2">
            <button type="reset" class="px-5 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">重置</button>
            <button type="submit" class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">确认保存</button>
        </div>
    </form>
</div>
<script>
document.getElementById('bannerFile').addEventListener('change',function(){
  if(!this.files[0])return;
  var f=new FormData();f.append('file',this.files[0]);f.append('_csrf','{{.csrf_token}}');
  fetch('/api/upload',{method:'POST',body:f}).then(r=>r.json()).then(d=>{
    if(d.url){var p=d.url.replace('/uploads/','');document.getElementById('bannerPath').value=p;}
    else alert(d.error||'上传失败');
  });
});
</script>
{{end}}
