<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-3 sm:px-4">
            <div class="flex justify-between h-14 items-center">
                <a href="/" class="text-lg font-bold text-blue-600">信息收集平台</a>
                <button id="menuBtn" onclick="toggleMenu()" class="sm:hidden text-gray-600 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <div id="navMenu" class="hidden sm:flex items-center space-x-3 sm:space-x-4">
                    <a href="/login" class="text-sm text-gray-600 hover:text-blue-600">登录</a>
                    <a href="/register" class="text-sm bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700">注册</a>
                </div>
            </div>
            <div id="mobileMenu" class="hidden sm:hidden pb-3 border-t border-gray-100 mt-1 pt-2 space-y-2">
                <a href="/login" class="block text-sm text-gray-600 py-2 px-1">登录</a>
                <a href="/register" class="block text-sm text-blue-600 py-2 px-1">注册</a>
            </div>
        </div>
    </nav>
    <main class="flex-1">
        {{.BodyContent}}
    </main>
    <footer class="bg-white border-t border-gray-200 py-4 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">&copy; 2024 信息收集平台</div>
    </footer>
    <script>function toggleMenu(){document.getElementById('mobileMenu').classList.toggle('hidden')}</script>
</body>
</html>
