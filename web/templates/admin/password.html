{{define "adminpassword-content"}}
<div class="max-w-md mx-auto">
    <h1 class="text-xl font-bold text-gray-800 mb-6">修改密码</h1>
    {{if .flash}}<div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded mb-4 text-sm">{{.flash}}</div>{{end}}
    {{if .error}}<div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">{{.error}}</div>{{end}}
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
        <form method="POST" action="/api/admin/password">
            <input type="hidden" name="_csrf" value="{{.csrf_token}}">
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">当前密码</label>
                <input type="password" name="old_password" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">新密码</label>
                <input type="password" name="new_password" required minlength="8" maxlength="20" placeholder="8-20位，需包含字母和数字" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="text-xs text-gray-400 mt-0.5">密码须包含字母和数字</p>
            </div>
            <div class="mb-6">
                <label class="block text-sm text-gray-600 mb-1">确认新密码</label>
                <input type="password" name="new_password_confirm" required minlength="8" maxlength="20" placeholder="请再次输入新密码" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded text-sm hover:bg-blue-700 transition">确认修改</button>
        </form>
    </div>
</div>
{{end}}
