{{define "admindash-content"}}
<h1 class="text-xl font-bold text-gray-800 mb-6">管理后台</h1>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 sm:gap-4 mb-8">
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4"><div class="text-2xl font-bold text-blue-600">{{.userCount}}</div><div class="text-sm text-gray-500 mt-1">用户总数</div></div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4"><div class="text-2xl font-bold text-gray-800">{{.postCount}}</div><div class="text-sm text-gray-500 mt-1">信息总数</div></div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4"><div class="text-2xl font-bold text-yellow-600">{{.pendingCount}}</div><div class="text-sm text-gray-500 mt-1">待审核</div></div>
    <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4"><div class="text-2xl font-bold text-green-600">{{.todayCount}}</div><div class="text-sm text-gray-500 mt-1">今日新增</div></div>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
    <a href="/admin/review" class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 hover:shadow-md transition"><h3 class="font-semibold text-gray-800">审核管理</h3><p class="text-xs text-gray-500 mt-1">查看和审核待发布信息</p></a>
    <a href="/admin/posts" class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 hover:shadow-md transition"><h3 class="font-semibold text-gray-800">信息管理</h3><p class="text-xs text-gray-500 mt-1">管理所有发布信息</p></a>
    <a href="/admin/export" class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 hover:shadow-md transition"><h3 class="font-semibold text-gray-800">导出报表</h3><p class="text-xs text-gray-500 mt-1">筛选并导出Excel报表</p></a>
    <a href="/admin/users" class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 hover:shadow-md transition"><h3 class="font-semibold text-gray-800">用户管理</h3><p class="text-xs text-gray-500 mt-1">管理平台注册用户</p></a>
</div>
{{end}}
