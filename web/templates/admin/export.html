{{define "adminexport-content"}}
<h1 class="text-xl font-bold text-gray-800 mb-4">导出报表</h1>
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 sm:p-6">
    <form id="exportForm" class="space-y-4">
        <div><label class="block text-sm text-gray-600 mb-1">分类（可多选）</label><select name="category_id" id="category_id" multiple class="border border-gray-300 rounded px-3 py-2 text-sm w-full sm:w-64" size="4"><option value="">全部分类</option>{{range .categories}}<option value="{{.ID}}">{{.Name}}</option>{{end}}</select></div>
        <div><label class="block text-sm text-gray-600 mb-1">状态（可多选）</label><select name="status" id="status" multiple class="border border-gray-300 rounded px-3 py-2 text-sm w-full sm:w-64" size="3"><option value="">全部状态</option><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已驳回</option></select></div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><div><label class="block text-sm text-gray-600 mb-1">开始日期</label><input type="date" name="start_date" id="start_date" class="border border-gray-300 rounded px-3 py-2 text-sm w-full"></div><div><label class="block text-sm text-gray-600 mb-1">结束日期</label><input type="date" name="end_date" id="end_date" class="border border-gray-300 rounded px-3 py-2 text-sm w-full"></div></div>
        <div><label class="block text-sm text-gray-600 mb-1">关键词</label><input type="text" name="keyword" id="keyword" placeholder="搜索标题或内容" class="border border-gray-300 rounded px-3 py-2 text-sm w-full sm:w-64"></div>
        <div class="flex gap-3"><button type="button" onclick="doPreview()" class="bg-blue-600 text-white px-6 py-2.5 rounded text-sm hover:bg-blue-700 transition">预 览</button><button type="button" onclick="doExport()" class="bg-green-600 text-white px-6 py-2.5 rounded text-sm hover:bg-green-700 transition">导出 Excel</button></div>
    </form>
</div>
<div id="previewResult" class="hidden mt-6"><div class="flex items-center justify-between mb-3"><h2 class="text-lg font-semibold text-gray-800">预览结果（共 <span id="previewTotal">0</span> 条，显示前20条）</h2><button onclick="closePreview()" class="text-sm text-gray-500 hover:text-gray-700">关闭</button></div><div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden"><div class="hidden sm:block overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-50"><tr><th class="text-left px-3 py-2 text-gray-600">标题</th><th class="text-left px-3 py-2 text-gray-600">分类</th><th class="text-left px-3 py-2 text-gray-600">联系人</th><th class="text-left px-3 py-2 text-gray-600">电话</th><th class="text-left px-3 py-2 text-gray-600">状态</th><th class="text-left px-3 py-2 text-gray-600">时间</th></tr></thead><tbody id="previewBody"></tbody></table></div><div id="previewMobile" class="sm:hidden divide-y divide-gray-100"></div></div></div>
<script>
function getMultiSelect(name){var sel=document.getElementById(name);if(!sel.selectedOptions||sel.selectedOptions.length===0)return'';var vals=[];for(var i=0;i<sel.options.length;i++){if(sel.options[i].selected)vals.push(sel.options[i].value)}return vals.join(',')}
function getFormData(){var d={};d.category_id=getMultiSelect('category_id');d.status=getMultiSelect('status');d.start_date=document.getElementById('start_date').value;d.end_date=document.getElementById('end_date').value;d.keyword=document.getElementById('keyword').value;return d}
function doPreview(){var d=getFormData();var qs=new URLSearchParams(d).toString();fetch('/api/admin/export/preview?'+qs).then(function(r){return r.json()}).then(function(d){document.getElementById('previewResult').classList.remove('hidden');document.getElementById('previewTotal').textContent=d.total;var body=document.getElementById('previewBody');body.innerHTML='';var mobile=document.getElementById('previewMobile');mobile.innerHTML='';d.rows.forEach(function(row){body.innerHTML+='<tr class=\"border-t border-gray-100\"><td class=\"px-3 py-2\">'+escapeHtml(row.title)+'</td><td class=\"px-3 py-2 text-xs\">'+escapeHtml(row.category)+'</td><td class=\"px-3 py-2 text-xs\">'+escapeHtml(row.contact||'')+'</td><td class=\"px-3 py-2 text-xs\">'+escapeHtml(row.phone||'')+'</td><td class=\"px-3 py-2 text-xs\">'+escapeHtml(row.status)+'</td><td class=\"px-3 py-2 text-xs text-gray-400\">'+escapeHtml(row.created)+'</td></tr>';mobile.innerHTML+='<div class=\"p-3\"><div class=\"font-medium text-sm truncate\">'+escapeHtml(row.title)+'</div><div class=\"flex gap-2 text-xs mt-1\"><span class=\"text-blue-600\">'+escapeHtml(row.category)+'</span><span class=\"text-gray-500\">'+escapeHtml(row.status)+'</span></div></div>'})})}
function doExport(){var d=getFormData();var qs=new URLSearchParams(d).toString();window.location.href='/api/admin/export?'+qs}
function closePreview(){document.getElementById('previewResult').classList.add('hidden')}
function escapeHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
{{end}}
