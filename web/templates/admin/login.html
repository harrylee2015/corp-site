{{define "adminlogin-content"}}
<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-lg shadow-md p-6 sm:p-8">
            <h2 class="text-xl font-bold text-center text-gray-800 mb-6">管理员登录</h2>
            {{if .error}}<div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-4 text-sm">{{.error}}</div>{{end}}
            <form method="POST" action="/api/admin/login"><input type="hidden" name="_csrf" value="{{.csrf_token}}">
                <div class="mb-4"><label class="block text-sm text-gray-600 mb-1">手机号</label><input type="tel" name="phone" required maxlength="11" placeholder="请输入手机号" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
                <div class="mb-6"><label class="block text-sm text-gray-600 mb-1">密码</label><input type="password" name="password" required placeholder="请输入密码" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
                <button type="submit" class="w-full bg-gray-800 text-white py-2 rounded text-sm hover:bg-gray-900 transition">登 录</button>
            </form>
        </div>
    </div>
</div>
{{end}}
